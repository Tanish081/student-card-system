services:
  - type: web
    name: student-card-system-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false   # Set this in Render dashboard → MongoDB Atlas URI
      - key: JWT_SECRET
        sync: false   # Set this in Render dashboard → a strong random string
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: DEFAULT_SCHOOL_ID
        value: SCH001
      - key: PUBLIC_BASE_URL
        sync: false   # Set this in Render dashboard → your Render service URL e.g. https://student-card-system-api.onrender.com
      - key: CLIENT_URL
        sync: false   # Set this in Render dashboard → your Vercel frontend URL e.g. https://your-app.vercel.app
